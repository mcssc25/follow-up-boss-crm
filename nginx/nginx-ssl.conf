# nginx-ssl.conf
# Use Docker's embedded DNS so upstream IPs are re-resolved after container restarts.
# Variable-based proxy_pass forces per-request resolution (with short resolver cache).
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name crm.bigbeachal.com;
    client_max_body_size 100M;

    ssl_certificate /etc/letsencrypt/live/crm.bigbeachal.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.bigbeachal.com/privkey.pem;
    # Condo search static app
    location = /condos {
        return 301 /condos/;
    }
    location /condos/ {
        alias /opt/condo-search/dist/;
        try_files $uri $uri/ $uri.html /condos/index.html;
    }


    # Gulf Coast Living Guide
    location /guide/ {
        alias /app/media/guide/;
        index beaches.html;
    }

    # Guide Images
    location /images/ {
        alias /app/media/images/;
    }

    location /static/ {
        alias /app/staticfiles/;
    }
    location /media/ {
        alias /app/media/;
    }
    location / {
        set $django_upstream web:8000;
        proxy_pass http://$django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name courses.bigbeachal.com;
    client_max_body_size 100M;

    ssl_certificate /etc/letsencrypt/live/courses.bigbeachal.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/courses.bigbeachal.com/privkey.pem;

    location /static/ {
        alias /app/staticfiles/;
    }
    location /media/ {
        alias /app/media/;
    }
    location / {
        set $django_upstream web:8000;
        proxy_pass http://$django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name stream.bigbeachal.com;

    ssl_certificate /etc/letsencrypt/live/stream.bigbeachal.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stream.bigbeachal.com/privkey.pem;

    location / {
        proxy_pass http://172.18.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;
    }
}
