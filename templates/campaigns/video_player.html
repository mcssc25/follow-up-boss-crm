<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ step.subject }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #111;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            width: 100%;
            padding: 20px 40px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            text-align: center;
        }
        .header .brand {
            font-size: 20px;
            font-weight: 700;
            color: #4f8cff;
            letter-spacing: 0.5px;
        }
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            width: 100%;
            max-width: 960px;
        }
        .video-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 24px;
            text-align: center;
        }
        .video-wrapper {
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        video {
            width: 100%;
            display: block;
        }
        .footer {
            width: 100%;
            padding: 20px 40px;
            text-align: center;
            color: #666;
            font-size: 13px;
            border-top: 1px solid #222;
        }
    </style>
</head>
<body>
    <div class="header">
        <span class="brand">AntiGravity CRM</span>
    </div>

    <div class="container">
        <h1 class="video-title">{{ step.subject }}</h1>
        <div class="video-wrapper">
            {% if step.video_file %}
            <video id="campaign-video" controls preload="metadata"
                   {% if step.video_thumbnail %}poster="{{ step.video_thumbnail.url }}"{% endif %}>
                <source src="{{ step.video_file.url }}" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            {% else %}
            <div style="padding: 80px 40px; text-align: center; color: #999;">
                <p style="font-size: 48px; margin-bottom: 16px;">&#9654;</p>
                <p>Video is not available.</p>
            </div>
            {% endif %}
        </div>
    </div>

    <div class="footer">
        &copy; AntiGravity CRM
    </div>

    {% if step.video_file %}
    <script>
    (function() {
        var video = document.getElementById('campaign-video');
        if (!video) return;

        var trackUrl = "{% url 'campaigns:video_track' step_id=step.id contact_id=contact.id %}";
        var lastSent = 0;

        function sendProgress() {
            if (video.duration && video.currentTime > lastSent + 5) {
                lastSent = video.currentTime;
                var data = JSON.stringify({
                    duration: Math.round(video.currentTime),
                    percent: Math.round((video.currentTime / video.duration) * 100)
                });
                if (navigator.sendBeacon) {
                    navigator.sendBeacon(trackUrl, data);
                } else {
                    var xhr = new XMLHttpRequest();
                    xhr.open('POST', trackUrl, true);
                    xhr.setRequestHeader('Content-Type', 'application/json');
                    xhr.send(data);
                }
            }
        }

        video.addEventListener('timeupdate', sendProgress);
        video.addEventListener('ended', function() {
            lastSent = 0;
            sendProgress();
        });
        video.addEventListener('pause', sendProgress);
    })();
    </script>
    {% endif %}
</body>
</html>
