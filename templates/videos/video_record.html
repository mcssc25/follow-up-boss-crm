{% extends "base.html" %}
{% block title %}Record Video{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="mb-6">
        <a href="{% url 'videos:list' %}" class="text-sm text-indigo-600 hover:text-indigo-800">&larr; Back to Videos</a>
    </div>

    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
        <h1 class="text-xl font-bold text-gray-900 mb-6">Record Video</h1>

        <!-- Settings (before recording) -->
        <div id="settings-panel" class="mb-6 space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
                <input type="text" id="video-title" placeholder="Give your video a name..."
                       class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Save to</label>
                <div class="flex space-x-4">
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="radio" name="storage" value="local" checked class="text-indigo-600">
                        <span class="text-sm text-gray-700">Server</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="radio" name="storage" value="youtube" class="text-indigo-600">
                        <span class="text-sm text-gray-700">YouTube</span>
                    </label>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Recording Mode</label>
                <div class="flex space-x-3">
                    <button type="button" data-mode="camera" class="mode-btn flex-1 px-4 py-3 rounded-lg border-2 border-indigo-600 bg-indigo-50 text-center cursor-pointer transition-all">
                        <svg class="w-6 h-6 mx-auto mb-1 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                        <span class="text-xs font-medium text-indigo-700">Camera</span>
                    </button>
                    <button type="button" data-mode="screen" class="mode-btn flex-1 px-4 py-3 rounded-lg border-2 border-gray-200 bg-white text-center cursor-pointer transition-all hover:border-gray-300">
                        <svg class="w-6 h-6 mx-auto mb-1 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                        <span class="text-xs font-medium text-gray-600">Screen</span>
                    </button>
                    <button type="button" data-mode="pip" class="mode-btn flex-1 px-4 py-3 rounded-lg border-2 border-gray-200 bg-white text-center cursor-pointer transition-all hover:border-gray-300">
                        <svg class="w-6 h-6 mx-auto mb-1 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/><rect x="13" y="8" width="5" height="4" rx="0.5" stroke-width="1.5" fill="currentColor" opacity="0.3"/></svg>
                        <span class="text-xs font-medium text-gray-600">Screen + Me</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Video preview -->
        <div class="aspect-video bg-black rounded-lg overflow-hidden mb-4 relative">
            <video id="preview" autoplay muted playsinline class="w-full h-full object-cover"></video>
            <canvas id="pip-canvas" class="w-full h-full hidden"></canvas>
            <video id="pip-cam" autoplay muted playsinline class="hidden absolute bottom-3 right-3 w-1/4 rounded-lg border-2 border-white shadow-lg object-cover" style="aspect-ratio:4/3;"></video>
            <video id="playback" controls class="w-full h-full hidden"></video>
        </div>

        <!-- Timer -->
        <div id="timer" class="text-center text-lg font-mono text-gray-600 mb-4 hidden">00:00</div>

        <!-- Controls -->
        <div class="flex justify-center space-x-3">
            <button id="btn-start"
                    class="inline-flex items-center px-6 py-2 bg-red-600 text-white text-sm font-medium rounded-full hover:bg-red-700">
                <svg class="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg>
                Start Recording
            </button>
            <button id="btn-stop"
                    class="inline-flex items-center px-6 py-2 bg-gray-600 text-white text-sm font-medium rounded-full hover:bg-gray-700 hidden">
                <svg class="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
                Stop
            </button>
            <button id="btn-redo"
                    class="inline-flex items-center px-6 py-2 border border-gray-300 text-gray-700 text-sm font-medium rounded-full hover:bg-gray-50 hidden">
                Re-record
            </button>
            <button id="btn-save"
                    class="inline-flex items-center px-6 py-2 bg-indigo-600 text-white text-sm font-medium rounded-full hover:bg-indigo-700 hidden">
                Save Video
            </button>
        </div>

        <!-- Status -->
        <div id="status" class="text-center text-sm text-gray-500 mt-4"></div>
    </div>
</div>

<script>
let mediaRecorder, chunks = [], timerInterval, seconds = 0;
let cameraStream = null, screenStream = null, recordingStream = null;
let pipAnimFrame = null;
let currentMode = 'camera';

const preview = document.getElementById('preview');
const playback = document.getElementById('playback');
const pipCanvas = document.getElementById('pip-canvas');
const pipCam = document.getElementById('pip-cam');
const timer = document.getElementById('timer');
const status = document.getElementById('status');
const btnStart = document.getElementById('btn-start');
const btnStop = document.getElementById('btn-stop');
const btnRedo = document.getElementById('btn-redo');
const btnSave = document.getElementById('btn-save');

// Mode selection
document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.mode-btn').forEach(b => {
            b.classList.remove('border-indigo-600', 'bg-indigo-50');
            b.classList.add('border-gray-200', 'bg-white');
            b.querySelector('svg').classList.remove('text-indigo-600');
            b.querySelector('svg').classList.add('text-gray-500');
            b.querySelector('span').classList.remove('text-indigo-700');
            b.querySelector('span').classList.add('text-gray-600');
        });
        btn.classList.remove('border-gray-200', 'bg-white');
        btn.classList.add('border-indigo-600', 'bg-indigo-50');
        btn.querySelector('svg').classList.remove('text-gray-500');
        btn.querySelector('svg').classList.add('text-indigo-600');
        btn.querySelector('span').classList.remove('text-gray-600');
        btn.querySelector('span').classList.add('text-indigo-700');

        currentMode = btn.dataset.mode;
        initPreview();
    });
});

async function initPreview() {
    stopAllStreams();
    preview.classList.remove('hidden');
    pipCanvas.classList.add('hidden');
    pipCam.classList.add('hidden');

    try {
        if (currentMode === 'camera') {
            cameraStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            preview.srcObject = cameraStream;
        } else if (currentMode === 'screen') {
            screenStream = await navigator.mediaDevices.getDisplayMedia({video: true, audio: true});
            preview.srcObject = screenStream;
            // Stop recording if user clicks "Stop sharing" in browser
            screenStream.getVideoTracks()[0].onended = () => {
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    btnStop.click();
                }
            };
        } else if (currentMode === 'pip') {
            screenStream = await navigator.mediaDevices.getDisplayMedia({video: true, audio: true});
            cameraStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            // Show camera overlay
            pipCam.srcObject = cameraStream;
            pipCam.classList.remove('hidden');
            preview.srcObject = screenStream;
            screenStream.getVideoTracks()[0].onended = () => {
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    btnStop.click();
                }
            };
        }
        status.textContent = '';
    } catch (err) {
        if (err.name === 'NotAllowedError') {
            status.textContent = 'Permission denied. Please allow access and try again.';
        } else {
            status.textContent = 'Could not access media. Please try again.';
        }
        // Fall back to camera mode
        if (currentMode !== 'camera') {
            currentMode = 'camera';
            document.querySelector('[data-mode="camera"]').click();
        }
    }
}

function stopAllStreams() {
    if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
    if (screenStream) { screenStream.getTracks().forEach(t => t.stop()); screenStream = null; }
    if (pipAnimFrame) { cancelAnimationFrame(pipAnimFrame); pipAnimFrame = null; }
}

function buildRecordingStream() {
    if (currentMode === 'camera') {
        return cameraStream;
    } else if (currentMode === 'screen') {
        return screenStream;
    } else {
        // PiP: composite screen + camera onto a canvas
        const canvas = pipCanvas;
        const ctx = canvas.getContext('2d');

        // Match screen resolution
        const screenTrack = screenStream.getVideoTracks()[0];
        const screenSettings = screenTrack.getSettings();
        canvas.width = screenSettings.width || 1920;
        canvas.height = screenSettings.height || 1080;

        const screenVideo = document.createElement('video');
        screenVideo.srcObject = screenStream;
        screenVideo.muted = true;
        screenVideo.play();

        const camVideo = document.createElement('video');
        camVideo.srcObject = cameraStream;
        camVideo.muted = true;
        camVideo.play();

        // Camera bubble size and position (bottom-right corner)
        const camW = Math.round(canvas.width * 0.22);
        const camH = Math.round(camW * 0.75);
        const camX = canvas.width - camW - 20;
        const camY = canvas.height - camH - 20;
        const camR = 12;

        function drawFrame() {
            ctx.drawImage(screenVideo, 0, 0, canvas.width, canvas.height);
            // Rounded camera bubble
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(camX + camR, camY);
            ctx.lineTo(camX + camW - camR, camY);
            ctx.quadraticCurveTo(camX + camW, camY, camX + camW, camY + camR);
            ctx.lineTo(camX + camW, camY + camH - camR);
            ctx.quadraticCurveTo(camX + camW, camY + camH, camX + camW - camR, camY + camH);
            ctx.lineTo(camX + camR, camY + camH);
            ctx.quadraticCurveTo(camX, camY + camH, camX, camY + camH - camR);
            ctx.lineTo(camX, camY + camR);
            ctx.quadraticCurveTo(camX, camY, camX + camR, camY);
            ctx.closePath();
            ctx.clip();
            ctx.drawImage(camVideo, camX, camY, camW, camH);
            ctx.restore();
            // Border
            ctx.strokeStyle = 'rgba(255,255,255,0.8)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.roundRect(camX, camY, camW, camH, camR);
            ctx.stroke();

            pipAnimFrame = requestAnimationFrame(drawFrame);
        }
        drawFrame();

        // Hide regular preview, show canvas
        preview.classList.add('hidden');
        pipCanvas.classList.remove('hidden');

        // Build stream from canvas + audio
        const canvasStream = canvas.captureStream(30);
        // Prefer screen audio, fall back to camera mic
        const audioTracks = screenStream.getAudioTracks().length > 0
            ? screenStream.getAudioTracks()
            : cameraStream.getAudioTracks();
        audioTracks.forEach(t => canvasStream.addTrack(t));

        return canvasStream;
    }
}

btnStart.addEventListener('click', async () => {
    // If screen/pip mode, we need to request screen access at record time if not already done
    if ((currentMode === 'screen' || currentMode === 'pip') && !screenStream) {
        await initPreview();
        if (!screenStream) return; // User denied
    }

    chunks = [];
    seconds = 0;
    recordingStream = buildRecordingStream();
    mediaRecorder = new MediaRecorder(recordingStream, {mimeType: 'video/webm'});
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    mediaRecorder.onstop = onRecordingStop;
    mediaRecorder.start(1000);

    btnStart.classList.add('hidden');
    btnStop.classList.remove('hidden');
    timer.classList.remove('hidden');
    timerInterval = setInterval(() => {
        seconds++;
        const m = String(Math.floor(seconds / 60)).padStart(2, '0');
        const s = String(seconds % 60).padStart(2, '0');
        timer.textContent = `${m}:${s}`;
    }, 1000);
});

btnStop.addEventListener('click', () => {
    mediaRecorder.stop();
    clearInterval(timerInterval);
    btnStop.classList.add('hidden');
    if (pipAnimFrame) { cancelAnimationFrame(pipAnimFrame); pipAnimFrame = null; }
});

function onRecordingStop() {
    const blob = new Blob(chunks, {type: 'video/webm'});
    playback.src = URL.createObjectURL(blob);
    preview.classList.add('hidden');
    pipCanvas.classList.add('hidden');
    pipCam.classList.add('hidden');
    playback.classList.remove('hidden');
    btnRedo.classList.remove('hidden');
    btnSave.classList.remove('hidden');
}

btnRedo.addEventListener('click', () => {
    playback.classList.add('hidden');
    btnRedo.classList.add('hidden');
    btnSave.classList.add('hidden');
    btnStart.classList.remove('hidden');
    timer.classList.add('hidden');
    seconds = 0;
    timer.textContent = '00:00';
    initPreview();
});

btnSave.addEventListener('click', async () => {
    const blob = new Blob(chunks, {type: 'video/webm'});
    const title = document.getElementById('video-title').value || 'Untitled Recording';
    const storage = document.querySelector('input[name="storage"]:checked').value;

    const formData = new FormData();
    formData.append('video', blob, 'recording.webm');
    formData.append('title', title);
    formData.append('storage_type', storage);

    btnSave.disabled = true;
    btnSave.textContent = 'Saving...';
    status.textContent = 'Uploading video...';

    stopAllStreams();

    try {
        const resp = await fetch("{% url 'videos:record_save' %}", {
            method: 'POST',
            headers: {'X-CSRFToken': '{{ csrf_token }}'},
            body: formData,
        });
        const data = await resp.json();
        if (data.redirect) {
            window.location.href = data.redirect;
        }
    } catch (err) {
        status.textContent = 'Upload failed. Please try again.';
        btnSave.disabled = false;
        btnSave.textContent = 'Save Video';
    }
});

// Init with camera mode
initPreview();
</script>
{% endblock %}
