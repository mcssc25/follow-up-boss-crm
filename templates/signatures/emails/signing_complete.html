<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; color: #333;">
    <div style="text-align: center; padding: 30px 0; border-bottom: 1px solid #e5e7eb;">
        <h1 style="font-size: 24px; margin: 0; color: #059669;">All Signatures Complete</h1>
    </div>
    <div style="padding: 30px 0;">
        <p>All signers have completed <strong>{{ document.title }}</strong>.</p>
        <div style="text-align: center; margin: 30px 0;">
            <a href="{{ download_url }}"
               style="display: inline-block; padding: 14px 32px; background-color: #059669; color: white; text-decoration: none; border-radius: 6px; font-weight: 600;">
                Download Signed Document
            </a>
        </div>
        <h3 style="font-size: 14px; color: #374151;">Signers:</h3>
        <ul style="list-style: none; padding: 0;">
            {% for signer in document.signers.all %}
            <li style="padding: 6px 0; border-bottom: 1px solid #f3f4f6;">
                {{ signer.name }} ({{ signer.email }}) — Signed {{ signer.signed_at|date:"M d, Y g:i A" }}
            </li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
