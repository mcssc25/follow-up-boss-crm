<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; color: #333;">
    <div style="text-align: center; padding: 30px 0; border-bottom: 1px solid #e5e7eb;">
        <h1 style="font-size: 24px; margin: 0; color: #059669;">Thank You for Signing</h1>
    </div>
    <div style="padding: 30px 0;">
        <p>Hi {{ signer.name }},</p>
        <p>You have successfully signed <strong>{{ document.title }}</strong>.</p>
        <p>A copy of the fully signed document will be available once all parties have signed.</p>
    </div>
</body>
</html>
