<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Cancelled</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-full flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8 text-center">
            <!-- Cancelled icon -->
            <div class="mx-auto w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mb-5">
                <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </div>

            <h1 class="text-2xl font-bold text-gray-900 mb-2">Appointment cancelled</h1>
            <p class="text-sm text-gray-500 mb-6">Your appointment for <span class="font-medium text-gray-700">{{ booking.event_type.name }}</span> has been cancelled.</p>

            <!-- Rebook link -->
            <a href="{% url 'scheduling:public_booking' slug=booking.event_type.slug %}"
               class="inline-block bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold py-2.5 px-6 rounded-lg transition shadow-sm">
                Book a new appointment
            </a>
        </div>

        <p class="mt-6 text-center text-xs text-gray-400">Powered by BigBeach CRM</p>
    </div>
</body>
</html>
