{% load tz %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-full flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8 text-center">
            <!-- Success icon -->
            <div class="mx-auto w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mb-5">
                <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
            </div>

            <h1 class="text-2xl font-bold text-gray-900 mb-2">You're booked!</h1>
            <p class="text-sm text-gray-500 mb-6">A confirmation email has been sent to {{ booking.email }}</p>

            <!-- Appointment details -->
            <div class="bg-gray-50 rounded-xl p-5 text-left mb-6">
                <h2 class="text-sm font-semibold text-gray-900 mb-3">{{ event_type.name }}</h2>
                <div class="space-y-2">
                    <div class="flex items-center gap-3 text-sm">
                        <svg class="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                        </svg>
                        <span class="text-gray-700" id="booking-date"></span>
                    </div>
                    <div class="flex items-center gap-3 text-sm">
                        <svg class="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                        <span class="text-gray-700">{{ event_type.duration_minutes }} minutes</span>
                    </div>
                    <div class="flex items-center gap-3 text-sm">
                        <svg class="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                        </svg>
                        <span class="text-gray-700">You'll receive a call at {{ booking.phone_number }}</span>
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="space-y-3">
                <a href="#" id="gcal-link" target="_blank"
                   class="block w-full bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 text-sm font-medium py-2.5 px-4 rounded-lg transition text-center">
                    <span class="inline-flex items-center gap-2">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none">
                            <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/>
                            <path d="M16 2v4M8 2v4M3 10h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        Add to Google Calendar
                    </span>
                </a>

                <div class="flex gap-3 text-sm">
                    <a href="{% url 'scheduling:reschedule_booking' token=booking.cancel_token %}"
                       class="flex-1 text-center text-indigo-600 hover:text-indigo-800 font-medium py-2 transition">
                        Reschedule
                    </a>
                    <a href="{% url 'scheduling:cancel_booking' token=booking.cancel_token %}"
                       class="flex-1 text-center text-gray-500 hover:text-red-600 font-medium py-2 transition">
                        Cancel
                    </a>
                </div>
            </div>
        </div>

        <p class="mt-6 text-center text-xs text-gray-400">Powered by BigBeach CRM</p>
    </div>

<script>
(function() {
    // Build Google Calendar URL and date display
    const startISO = '{{ booking.start_time.isoformat }}';
    const endISO = '{{ booking.end_time.isoformat }}';
    const ownerName = '{{ event_type.owner.get_full_name|escapejs }}';

    function toGCalFormat(isoStr) {
        const d = new Date(isoStr);
        return d.toISOString().replace(/[-:]/g, '').replace(/\.\d{3}/, '');
    }

    const gcalStart = toGCalFormat(startISO);
    const gcalEnd = toGCalFormat(endISO);
    const gcalUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=Call+with+${encodeURIComponent(ownerName)}&dates=${gcalStart}/${gcalEnd}&details=Phone+appointment`;
    document.getElementById('gcal-link').href = gcalUrl;

    // Format date display
    const start = new Date(startISO);
    const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: 'numeric', minute: '2-digit' };
    document.getElementById('booking-date').textContent = start.toLocaleString('en-US', opts);
})();
</script>
</body>
</html>
