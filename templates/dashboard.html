{% extends "base.html" %}

{% block title %}Dashboard - CRM{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold text-gray-900 mb-6">Dashboard</h1>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
        <p class="text-sm font-medium text-gray-500">Total Contacts</p>
        <p class="text-3xl font-bold text-gray-900 mt-2">0</p>
    </div>
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
        <p class="text-sm font-medium text-gray-500">Active Deals</p>
        <p class="text-3xl font-bold text-gray-900 mt-2">0</p>
    </div>
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
        <p class="text-sm font-medium text-gray-500">Tasks Due Today</p>
        <p class="text-3xl font-bold text-gray-900 mt-2">0</p>
    </div>
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
        <p class="text-sm font-medium text-gray-500">Active Campaigns</p>
        <p class="text-3xl font-bold text-gray-900 mt-2">0</p>
    </div>
</div>
{% endblock %}
