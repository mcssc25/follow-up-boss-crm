<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gulf Shores Neighborhoods | Big Beach AL</title>
    <meta name="description" content="Explore the best neighborhoods in Gulf Shores, Alabama. Premium map-based search for primary home buyers.">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Find Your Neighborhood</h1>
            <p>Interactive Map of Gulf Shores Primary Communities</p>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search by name, amenity, or style...">
            </div>
        </div>
    </header>

    <div class="container-split">
        <section class="results-panel">
            <main id="neighborhoodGrid">
                <!-- Cards injected here -->
            </main>
        </section>
        
        <section class="map-panel">
            <div id="neighborhood-map"></div>
            <div class="map-overlay">
                <span id="activeNeighborhoodName">Gulf Shores, AL</span>
            </div>
        </section>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="modalDetails"></div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
